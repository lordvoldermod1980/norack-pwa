# Build norack-pwa and deploy to GitHub Pages on every push to main.
# One-time setup in the repo: Settings → Pages → Source = "GitHub Actions".
# The app is a client-side SPA with no build secrets (auth is a runtime login; backend defaults to CF,
# switchable in the login screen). Site: https://lordvoldermod1980.github.io/norack-pwa-/
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: cp dist/index.html dist/404.html # SPA fallback (GitHub Pages has no server-side routing)
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
